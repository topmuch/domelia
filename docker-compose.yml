# Docker Compose pour Domelia.fr - Compatible Coolify
version: '3.8'

services:
  domelia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domelia-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/production.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - domelia-db:/app/db
      - domelia-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  domelia-db:
    driver: local
  domelia-uploads:
    driver: local

# Configuration réseau
networks:
  default:
    name: domelia-network
